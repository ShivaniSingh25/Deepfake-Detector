stage: 1
seed: 42
use_wandb: false

data:
  root: "/data/shivani/deepfake_vlm/FF_faces"
  type: "ff++"
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  max_frames_per_video: null
  train_balance: true
  val_balance: false
  test_balance: false

model:
  clip_model: "openai/clip-vit-base-patch16"
  llm_model: "mistralai/Mistral-7B-Instruct-v0.3"
  embed_dim: 768
  num_patches: 196
  seq_len: 393
  num_reasoning_layers: 3
  use_llm: false
  use_wavelet: true
  use_srm: true
  use_bridge: true
  use_reasoning: true

fusion:
  gate_dim: 256

prompts:
  real_prompt: "authentic human face"
  fake_prompt: "manipulated synthetic face"

training:
  stage1:
    lr: 5e-5
    weight_decay: 1e-2
    epochs: 50
    batch_size: 16
    grad_accum_steps: 2
    num_workers: 4
    max_grad_norm: 1.0
    early_stopping_patience: 5
    eval_threshold: 0.5

losses:
  lambda_cls: 1.0
  lambda_contrast: 0.1
  lambda_proto: 0.01
  temperature: 0.07
  label_smoothing: 0.0